services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - front-end
      - listings-api
      - warehouse-api
      - orders-api
      - docs-server

  front-end:
    image: ghcr.io/mcmastercce/bvd-103-mcmasterful-books/mcmasterful-books-docker:main
    volumes:
      - ./adapter:/source/adapter

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  mongo-listings:
    image: mongo:7
    volumes:
      - mongo_listings_data:/data/db
      - ./mongo/seed_listings.mongodb.js:/docker-entrypoint-initdb.d/seed_listings.mongodb.js:ro

  mongo-warehouse:
    image: mongo:7
    volumes:
      - mongo_warehouse_data:/data/db

  mongo-orders:
    image: mongo:7
    volumes:
      - mongo_orders_data:/data/db

  listings-api:
    image: node:20
    working_dir: /app
    volumes:
      - ./services/listings-api:/app
    environment:
      PORT: 3001
      MONGODB_URL: mongodb://mongo-listings:27017
      DATABASE_NAME: mcmasterful-books-listings
      RABBITMQ_URL: amqp://rabbitmq:5672
      LISTINGS_API_URL: http://listings-api:3001/books
    command: sh -c "npm install && npm run tsoa && npm run start"
    depends_on:
      - mongo-listings
      - rabbitmq

  warehouse-api:
    image: node:20
    working_dir: /app
    volumes:
      - ./services/warehouse-api:/app
    environment:
      PORT: 3002
      MONGODB_URL: mongodb://mongo-warehouse:27017
      DATABASE_NAME: mcmasterful-books-warehouse
      RABBITMQ_URL: amqp://rabbitmq:5672
      LISTINGS_API_URL: http://listings-api:3001/books
    command: sh -c "npm install && npm run tsoa && npm run start"
    depends_on:
      - mongo-warehouse
      - rabbitmq

  orders-api:
    image: node:20
    working_dir: /app
    volumes:
      - ./services/orders-api:/app
    environment:
      PORT: 3003
      MONGODB_URL: mongodb://mongo-orders:27017
      DATABASE_NAME: mcmasterful-books-orders
      RABBITMQ_URL: amqp://rabbitmq:5672
      LISTINGS_API_URL: http://listings-api:3001/books
    command: sh -c "npm install && npm run tsoa && npm run start"
    depends_on:
      - mongo-orders
      - rabbitmq

  docs-server:
    image: node:20
    working_dir: /app
    volumes:
      - ./services/docs-server:/app
    environment:
      PORT: 3004
    command: sh -c "npm install && npm run start"
    depends_on:
      - listings-api
      - warehouse-api
      - orders-api

volumes:
  mongo_listings_data:
  mongo_warehouse_data:
  mongo_orders_data:
