proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=books_cache:10m max_size=100m inactive=10m use_temp_path=off;

upstream backend {
    server server1:3001;
    server server2:3001;
    server server3:3001;
}

server {
    listen 80;

    location /api/books/ {
        proxy_cache books_cache;
        proxy_cache_valid 200 5m;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend;
    }

    location = /api/books {
        proxy_cache books_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_bypass $args;
        proxy_no_cache $args;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend;
    }

    location / {
        proxy_cache books_cache;
        proxy_cache_valid 200 5m;
        proxy_pass http://front-end:9080/;
    }
}