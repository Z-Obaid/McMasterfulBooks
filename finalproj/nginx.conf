server {
    listen 80;

    location /api/books/ {
        proxy_pass http://listings-api:3001/books/;
    }

    location = /api/books {
        proxy_pass http://listings-api:3001/books;
    }

    location /api/orders/ {
        proxy_pass http://orders-api:3003/orders/;
    }

    location = /api/orders {
        proxy_pass http://orders-api:3003/orders;
    }

    location /api/warehouse/ {
        proxy_pass http://warehouse-api:3002/warehouse/;
    }

    location /docs {
        proxy_pass http://docs-server:3004/docs;
    }

    location /docs/ {
        proxy_pass http://docs-server:3004/docs/;
    }

    location /api/docs {
        proxy_pass http://docs-server:3004/api/docs;
    }

    location /openapi/ {
        proxy_pass http://docs-server:3004/openapi/;
    }

    location / {
        proxy_pass http://front-end:9080/;
    }
}
