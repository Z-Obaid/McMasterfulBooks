services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - front-end
      - listings-api
      - warehouse-api
      - orders-api
      - docs-server

  front-end:
    image: ghcr.io/mcmastercce/bvd-103-mcmasterful-books/mcmasterful-books-docker:main
    volumes:
      - ./adapter:/source/adapter

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  mongo-listings:
    image: mongo:latest

  mongo-warehouse:
    image: mongo:latest

  mongo-orders:
    image: mongo:latest

  listings-api:
    image: node:20
    working_dir: /app
    volumes:
      - ./services/listings-api:/app
    command: sh -c "npm install && npm run tsoa && npm run start"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongo-listings:27017
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      - mongo-listings
      - rabbitmq

  warehouse-api:
    image: node:20
    working_dir: /app
    volumes:
      - ./services/warehouse-api:/app
    command: sh -c "npm install && npm run tsoa && npm run start"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongo-warehouse:27017
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      - mongo-warehouse
      - rabbitmq

  orders-api:
    image: node:20
    working_dir: /app
    volumes:
      - ./services/orders-api:/app
    command: sh -c "npm install && npm run tsoa && npm run start"
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongo-orders:27017
      RABBITMQ_URL: amqp://rabbitmq:5672
      WAREHOUSE_API_URL: http://warehouse-api:3002
    depends_on:
      - mongo-orders
      - rabbitmq
      - warehouse-api

  docs-server:
    image: node:20
    working_dir: /app
    volumes:
      - ./services/docs-server:/app
    command: sh -c "npm install && npm run start"
    environment:
      PORT: 3004
      LISTINGS_API_URL: http://listings-api:3001
      WAREHOUSE_API_URL: http://warehouse-api:3002
      ORDERS_API_URL: http://orders-api:3003
    depends_on:
      - listings-api
      - warehouse-api
      - orders-api
